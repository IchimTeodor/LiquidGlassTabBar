name: LiquidGlassTabBar
options:
  bundleIdPrefix: com.teodorichim
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  LiquidGlassTabBar:
    type: application
    platform: iOS
    sources: [LiquidGlassTabBar]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.teodorichim.LiquidGlassTabBar
  LiquidGlassTabBarTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: LiquidGlassTabBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  LiquidGlassTabBar:
    build:
      targets:
        LiquidGlassTabBar: all
        LiquidGlassTabBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [LiquidGlassTabBarTests]
